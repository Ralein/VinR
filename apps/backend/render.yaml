services:
  # 1. FastAPI Web Service
  - type: web
    name: vinr-api
    runtime: docker
    plan: free
    region: singapore # Based on user's screenshot
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      - key: APP_NAME
        value: "VinR API"
      - key: DEBUG
        value: "false"
      # Manual configuration required for these in Render Dashboard:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # 2. Celery Background Worker
  - type: worker
    name: vinr-worker
    runtime: docker
    plan: free
    region: singapore
    dockerCommand: celery -A app.worker.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      # Workers need same keys for logic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

# 3. Managed Redis
  - type: redis
    name: vinr-redis
    plan: free
    region: singapore
    ipAllowList: [] # Required to be empty for standard cloud access

# 4. Managed Postgres
databases:
  - name: vinr-db
    plan: free
    region: singapore
    postgresMajorVersion: 15
