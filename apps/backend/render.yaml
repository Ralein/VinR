services:
  # 1. FastAPI Web Service
  - type: web
    name: vinr-api
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      - key: APP_NAME
        value: "VinR API"
      - key: APP_VERSION
        value: "0.1.0"
      - key: DEBUG
        value: "false"
      # Required secrets from your .env
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://vinr--20q97d982l.expo.app" # Using your current Expo web URL
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      # External Service Keys
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: EVENTBRITE_API_KEY
        sync: false
      - key: EVENTBRITE_PUBLIC_TOKEN
        sync: false
      - key: EVENTBRITE_CLIENT_SECRET
        sync: false
      - key: EXPO_PUSH_URL
        value: "https://exp.host/--/api/v2/push/send"

  # 2. Celery Background Worker
  - type: worker
    name: vinr-worker
    runtime: docker
    plan: free
    region: singapore
    dockerCommand: celery -A app.worker.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: vinr-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

# 3. Managed Redis
  - type: redis
    name: vinr-redis
    plan: free
    region: singapore
    ipAllowList: []

# 4. Managed Postgres
databases:
  - name: vinr-db
    plan: free
    region: singapore
    postgresMajorVersion: 15
